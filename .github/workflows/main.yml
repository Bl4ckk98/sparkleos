# ============================================================
# SparkleOS CI/CD - Build RPM, upload su Fedora Copr, build ISO
# Si attiva ad ogni push sul branch main.
# ============================================================
name: Build & Publish SparkleOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:     # consente lancio manuale dalla UI GitHub

jobs:
  # ============================================================
  # JOB 1: Build RPM e upload su Fedora Copr
  # ============================================================
  build-rpm:
    name: Build RPM → Copr
    runs-on: ubuntu-latest
    container:
      image: fedora:43

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          dnf install -y \
            rpm-build \
            rpmdevtools \
            python3-colorama \
            python3-openpyxl \
            copr-cli \
            tar \
            git

      - name: Extract version from spec
        id: version
        run: |
          VERSION=$(grep '^Version:' rpm-build/sparkle-os.spec | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building sparkle-os-$VERSION"

      - name: Setup rpmbuild tree
        run: rpmdev-setuptree

      - name: Create source tarball
        run: |
          VERSION=${{ steps.version.outputs.version }}
          tar czf ~/rpmbuild/SOURCES/sparkle-os-${VERSION}.tar.gz \
            --transform="s|^|sparkle-os-${VERSION}/|" \
            rpm-build/src/ \
            assets/ \
            theme/
          echo "Tarball contents:"
          tar tzf ~/rpmbuild/SOURCES/sparkle-os-${VERSION}.tar.gz | head -30

      - name: Copy spec
        run: cp rpm-build/sparkle-os.spec ~/rpmbuild/SPECS/

      - name: Build SRPM
        run: |
          rpmbuild -bs ~/rpmbuild/SPECS/sparkle-os.spec
          echo "SRPM:"
          ls ~/rpmbuild/SRPMS/

      - name: Build binary RPM (smoke test)
        run: |
          rpmbuild -bb ~/rpmbuild/SPECS/sparkle-os.spec
          echo "RPM:"
          ls ~/rpmbuild/RPMS/noarch/
          rpm -qpl ~/rpmbuild/RPMS/noarch/sparkle-os-*.rpm

      - name: Configure Copr CLI
        env:
          COPR_LOGIN:    ${{ secrets.COPR_LOGIN }}
          COPR_TOKEN:    ${{ secrets.COPR_TOKEN }}
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
        run: |
          mkdir -p ~/.config
          cat > ~/.config/copr <<EOF
          [copr-cli]
          login    = ${COPR_LOGIN}
          username = ${COPR_USERNAME}
          token    = ${COPR_TOKEN}
          copr_url = https://copr.fedorainfracloud.org
          EOF

      - name: Upload SRPM to Copr
        env:
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
        run: |
          SRPM=$(ls ~/rpmbuild/SRPMS/sparkle-os-*.src.rpm)
          echo "Uploading: $SRPM"
          copr-cli build \
            --chroot fedora-43-x86_64 \
            ${COPR_USERNAME}/sparkle-os \
            "$SRPM"
          echo "Build completata su Copr!"

      - name: Upload RPM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sparkle-os-rpms
          path: |
            ~/rpmbuild/RPMS/noarch/*.rpm
            ~/rpmbuild/SRPMS/*.src.rpm
          retention-days: 30

  # ============================================================
  # JOB 2: Build ISO con livemedia-creator
  # Gira dentro un container Fedora 42 nativo GHA (privileged)
  # per accesso ai loop devices - nessun container richiesto.
  # ============================================================
  build-iso:
    name: Build ISO
    runs-on: ubuntu-latest
    needs: build-rpm          # attende che l'RPM sia su COPR prima di buildare la ISO
    container:
      image: fedora:43
      options: --privileged --device /dev/loop-control

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache DNF packages
        uses: actions/cache@v4
        with:
          path: .dnf-cache
          key: dnf-fedora43-${{ hashFiles('sparkle-os.ks') }}
          restore-keys: |
            dnf-fedora43-

      - name: Install build dependencies
        run: |
          dnf install -y \
            lorax \
            anaconda-tui \
            pykickstart \
            dbus-daemon \
            --setopt=cachedir=${{ github.workspace }}/.dnf-cache \
            --setopt=keepcache=1

      - name: Build ISO
        run: bash build-iso.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: sparkleos-iso
          path: output/*.iso
          retention-days: 7
          if-no-files-found: error

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sparkleos-build-log
          path: |
            livemedia.log
            program.log
            logs/
          retention-days: 7
          if-no-files-found: ignore